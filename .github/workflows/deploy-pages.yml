name: Deploy docs/ to GitHub Pages

# v0.10.2 — switched from the legacy Jekyll builder (which started silently
# failing with "Page build failed" after the v0.10.1 appcast push) to the
# modern GitHub Actions-based Pages deployment. The new pipeline uploads
# docs/ as an artifact and publishes it via actions/deploy-pages, with
# clear logs on every run. Sparkle's appcast.xml will now reach users
# without depending on the legacy builder's mysterious health.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
